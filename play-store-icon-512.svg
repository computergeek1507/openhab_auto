<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="512" height="512" viewBox="0 0 108 108">
  <!-- Play Store hi-res icon (512x512). Full-bleed square; Google applies the
       rounded mask automatically, so do not pre-round the corners.
       Matches the in-app adaptive icon (orange gradient + white house + green dot). -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="108" y2="108" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FB8C00"/>
      <stop offset="1" stop-color="#E64A19"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="108" height="108" fill="url(#bg)"/>
  <!-- House silhouette -->
  <path d="M54,30 L80,51 L80,80 L28,80 L28,51 Z" fill="#FFFFFF"/>
  <!-- "On" indicator -->
  <circle cx="54" cy="63" r="9" fill="#4CAF50"/>
</svg>
